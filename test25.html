    if (data) {
      var info = {
        id: data.id,
        func: data.func || 'response',

            func: info.func,

          data: argsStr.substring(0, 500),

    }

    // Forward to original handler (transparent)

      return origOnNativeMessage.apply(this, arguments);

      teamId: ctx.team ? ctx.team.internalId : '',
      channelId: ctx.channel ? ctx.channel.id : ''

  });
}

function stopInterceptor() {
